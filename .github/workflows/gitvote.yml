name: GitVote Ballot Validation

on:
  pull_request:
    branches:
      - "proposal/**"

permissions:
  contents: read

concurrency:
  group: gitvote-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  validate-ballot:
    name: Validate signed ballot
    runs-on: ubuntu-latest
    steps:
      - name: Check out the proposed repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build pinned GitVote
        env:
          GITVOTE_COMMIT: b2879a845254b462e7e43fff1fdc63acdde10ac6
        run: |
          git clone https://github.com/ducks/gitvote.git "$RUNNER_TEMP/gitvote"
          git -C "$RUNNER_TEMP/gitvote" checkout "$GITVOTE_COMMIT"
          cargo build --locked --release \
            --manifest-path "$RUNNER_TEMP/gitvote/Cargo.toml"

      - name: Validate the proposed ballot
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          "$RUNNER_TEMP/gitvote/target/release/gitvote" validate-pr \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA"
